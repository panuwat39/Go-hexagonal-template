services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: go-hexagonal-template:local
    container_name: go-hexagonal-template-api
    ports:
      - "8080:8080"
    environment:
      APP_NAME: go-hexagonal-template
      APP_ENV: local
      HTTP_PORT: 8080
      CORS_ALLOWED_ORIGINS: "*"
    restart: unless-stopped
